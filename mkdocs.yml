site_name: Tutoriels OpenClaw
site_description: Documentation et tutoriels OpenClaw de Thomas
site_url: https://thomasgermain93.github.io/openclaw-tutoriels-md/
repo_url: https://github.com/thomasgermain93/openclaw-tutoriels-md
repo_name: thomasgermain93/openclaw-tutoriels-md

theme:
  name: material
  language: fr
  icon:
    logo: material/book-open-page-variant
  font:
    text: Figtree
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Passer en mode clair
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Passer en mode sombre
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Accueil: index.md
  - Tutoriels:
      - Env global OpenClaw: tutoriels/01-env-global-openclaw.md
      - Setup Google Ads API: tutoriels/02-google-ads-api-setup.md
